# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# vim:fileencoding=utf-8:foldmethod=marker

# : Flavor {{{

[flavor]
use = "iterm2-dark"

# : }}}

# : Manager {{{

[manager]
cwd = { fg = "#BFBAB0" }

# Hovered
hovered         = { fg = "#0F1419", bg = "#F29718" }        # amber hover
preview_hovered = { fg = "#F29718" }                         # amber
find_keyword    = { fg = "#0F1419", bg = "#F29718" }         # yellow-orange
find_position   = { fg = "#F29718", bold = true, underline = true }

# Marker
marker_copied   = { fg = "#59C2FF", bg = "#16242E" }         # blue accent
marker_cut      = { fg = "#FF7733", bg = "#16242E" }         # orange
marker_marked   = { fg = "#95E6CB", bg = "#16242E" }         # teal
marker_selected = { fg = "#C2D94C", bg = "#16242E" }         # green

# Tab
tab_active   = { fg = "#0F1419", bg = "#59C2FF" }
tab_inactive = { fg = "#BFBAB0", bg = "#0F1419" }
tab_width    = 1

# Count
count_copied   = { fg = "#0F1419", bg = "#59C2FF" }
count_cut      = { fg = "#0F1419", bg = "#FF7733" }
count_selected = { fg = "#0F1419", bg = "#C2D94C" }

# Border
border_symbol = "в”Ӯ"
border_style  = { fg = "#20272C" }

# Highlighting
syntect_theme = ""


# : }}}


# : Status {{{

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
overall =  { fg = "#0F1419", bg = "#0F1419" }

# to get curved status bar
#separator_open  = ""
#separator_close = ""
#separator_style = { fg = "#0F1419", bg = "#0F1419" }

# Mode
mode_normal = { fg = "#0F1419", bg = "#59C2FF" }
mode_select = { fg = "#0F1419", bg = "#F29718" }
mode_unset  = { fg = "#0F1419", bg = "#C2D94C" }

# Progress
progress_label  = { bold = false }
progress_normal = { fg = "#C2D94C", bg = "#0A0E12" }
progress_error  = { fg = "#FF3333", bg = "#0A0E12" }

# Permissions
permissions_t = { fg = "#C2D94C" }
permissions_r = { fg = "#F29718" }
permissions_w = { fg = "#FF3333" }
permissions_x = { fg = "#59C2FF" }
permissions_s = { fg = "#5C6773" }

# : }}}


# : Select {{{

[select]
border   = { fg = "#20272C" }
active   = { fg = "#F29718", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#20272C" }
title    = { fg = "#59C2FF" }
value    = { fg = "#BFBAB0" }
selected = { fg = "#0F1419", bg = "#F29718" }

# : }}}


# : Completion {{{

[completion]
border   = { fg = "#20272C" }
active   = { fg = "#0F1419", bg = "#F29718" }
inactive = { fg = "#BFBAB0", bg = "#131E27" }

# Icons
icon_file    = "п…ӣ"
icon_folder  = "пҒ»"
icon_command = "п’ү"

# : }}}


# : Tasks {{{

[tasks]

border  = { fg = "#20272C" }
title   = { fg = "#BFBAB0" }
hovered = { fg = "#F29718", underline = true }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#0F1419" }
cand            = { fg = "#59C2FF" }
rest            = { fg = "#BFBAB0" }
desc            = { fg = "#95E6CB" }
separator       = " оӘң "
separator_style = { fg = "#5C6773" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#F29718" }
run     = { fg = "#59C2FF" }
desc    = { fg = "#BFBAB0" }
hovered = { fg = "#0F1419", bg = "#F29718", bold = true }
footer  = { fg = "#BFBAB0", bg = "#0F1419" }

# : }}}


# : Notify {{{

[notify]
title_info  = { fg = "#59C2FF" }
title_warn  = { fg = "#F29718" }
title_error = { fg = "#FF3333" }

# Icons
#icon_info  = "пҒҡ"
#icon_warn  = "пҒұ"
icon_error = "пҒ—"

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
    # Sections correspond to different colors and their meaning

	# Can see and not hear
	{ mime = "image/*", fg = "yellow" },
	{ mime = "application/{epub*,pdf,doc,rtf,vnd.*}", fg = "yellow" },

	# Can hear
	{ mime = "{audio,video}/*", fg = "magenta" },

    # Is link
    { name = "*", is = "link", fg = "cyan" },
    { name = "*/", is = "link", fg = "cyan", bold = true },

	# Can open
	{ mime = "application/{,g}zip", fg = "blue" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "blue" },
	{ name = "*/", fg = "blue", bold = true },

    # Can run
	{ name = "*", is = "exec", fg = "green" },

	# Broken
	{ name = "*", is = "orphan", bg = "red" },
	{ name = "*", is = "dummy", bg = "red" },
	{ name = "*/", is = "dummy", bg = "red" },
]

