# =========================
# YAZI CONFIG (SIXEL MODE)
# =========================

[mgr]
show_hidden = true
sort_by     = "natural"

[preview]
max_width   = 800
max_height  = 1000
image_delay = 0   # important for terminal-based (sixel) rendering

[plugin]
  prepend_preloaders = [
    # All standard audio / video / image (includes Adobe Photoshop .psd = image/adobe.photoshop)
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    # Subtitle files
    { mime = "application/subrip", run = "mediainfo" },

    # Adobe vector formats — Illustrator, EPS, PostScript, DVB AIT
    # (collapsed from 5 separate rows into one brace-glob rule)
    { mime = "application/{postscript,illustrator,dvb.ait,vnd.adobe.illustrator,eps}", run = "mediainfo" },
    { mime = "image/x-eps", run = "mediainfo" },

    # Extension fallback: sometimes .ai/.eps/.ait is mis-detected as application/pdf
    { url = "*.{ai,eps,ait}", run = "mediainfo" },
  ]

  prepend_previewers = [
    # Code & plain-text files are handled automatically by yazi's built-in
    # bat/highlight previewer — no extra entry required here.

    # All standard audio / video / image
    { mime = "{audio,video,image}/*", run = "mediainfo" },

    # Subtitle files
    { mime = "application/subrip", run = "mediainfo" },

    # Adobe vector formats
    { mime = "application/{postscript,illustrator,dvb.ait,vnd.adobe.illustrator,eps}", run = "mediainfo" },
    { mime = "image/x-eps", run = "mediainfo" },

    # Extension fallback for mis-detected AI / EPS / AIT files
    { url = "*.{ai,eps,ait}", run = "mediainfo" },
  ]

[tasks]
  image_alloc = 1073741824  # 1 GiB — raise if you preview very large images


# =========================
# OPENERS
# =========================

[opener]

edit = [
  { run = '${EDITOR:-vi} "$@"', desc = "$EDITOR",       block = true, for = "unix"    },
  { run = 'code %*',            desc = "code",           orphan = true, for = "windows" },
  { run = 'code -w %*',         desc = "code (block)",   block = true,  for = "windows" },
  { run = 'code "$@"',           desc = "VSCode",            block = true,  for = "unix"    },
]

pdff = [
  { run = 'zathura "$@"', desc = "Zathura", block = true, for = "unix" },
]

open = [
  { run = 'xdg-open "$1"',                desc = "Open", for = "linux"   },
  { run = 'open "$@"',                    desc = "Open", for = "macos"   },
  { run = 'start "" "%1"', orphan = true, desc = "Open", for = "windows" },
  { run = 'termux-open "$1"',             desc = "Open", for = "android" },
]

reveal = [
  { run = 'xdg-open "$(dirname "$1")"',           desc = "Reveal",     for = "linux"   },
  { run = 'open -R "$1"',                         desc = "Reveal",     for = "macos"   },
  { run = 'explorer /select,"%1"', orphan = true, desc = "Reveal",     for = "windows" },
  { run = 'termux-open "$(dirname "$1")"',        desc = "Reveal",     for = "android" },
  { run = 'clear; exiftool "$1"; echo "Press enter to exit"; read _',
    block = true, desc = "Show EXIF", for = "unix" },
]

extract = [
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix"    },
  { run = 'ya pub extract --list %*',   desc = "Extract here", for = "windows" },
]

play = [
  { run = 'mpv --force-window "$@"', orphan = true, for = "unix"    },
  { run = 'mpv --force-window %*',   orphan = true, for = "windows" },
  { run = 'mediainfo "$1"; echo "Press enter to exit"; read _',
    block = true, desc = "Show media info", for = "unix" },
]



# =========================
# FILETYPE OPEN RULES
# =========================

[open]
rules = [
  # Folder
  { url = "*/", use = ["edit", "open", "reveal"] },

  # PDF — must come before the text/* catch-all
  { mime = "application/pdf", use = ["pdff", "reveal"] },

  # Plain text & source code (bat previewer handles syntax highlighting)
  { mime = "text/*",           use = ["edit", "reveal"] },
  { mime = "inode/empty",      use = ["edit", "reveal"] },

  # Images
  { mime = "image/*", use = ["open", "reveal"] },

  # Audio & video
  { mime = "{audio,video}/*", use = ["play", "reveal"] },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",
    use = ["extract", "reveal"] },

  # JSON / JavaScript
  { mime = "application/{json,ndjson}", use = ["edit", "reveal"] },
  { mime = "*/javascript",              use = ["edit", "reveal"] },

  # Fallback
  { url = "*", use = ["open", "reveal"] },
]
